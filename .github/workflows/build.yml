name: Kotlin CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "输入版本号（格式：x.x.x，例如 1.2.3）"
        required: true
  push:
    tags:
      - "v*"  # 支持 Tag 触发

jobs:
  build:
    runs-on: ubuntu-latest
    environment: keystore
    env:
      KEYSTORE_PATH: tv/app/keystore.p12
      KEYSTORE_TYPE: PKCS12
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: 解码生成 p12
      run: |
        mkdir -p tv/app
        echo "正在解码BASE64密钥..."
        openssl base64 -d -A <<< "${{ secrets.KEYSTORE_BASE64 }}" > $KEYSTORE_PATH
        echo "=== 文件验证 ==="
        echo "当前工作目录: $(pwd)"
        echo "密钥库绝对路径: $(realpath $KEYSTORE_PATH)"
        ls -lR tv/app
        if [ ! -s $KEYSTORE_PATH ]; then
          echo "❌ 错误：keystore.p12 文件为空"
          exit 1
        fi
        echo "验证密钥库..."
        keytool -list -v \
          -keystore $KEYSTORE_PATH \
          -storepass $KEYSTORE_PASSWORD \
          -storetype $KEYSTORE_TYPE || {
            echo "❌ 密钥库验证失败";
            exit 1;
          }

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :tv:assembleRelease --stacktrace
      env:
        KEYSTORE: ${{ github.workspace }}/tv/app/keystore.p12
        KEYSTORE_TYPE: ${{ env.KEYSTORE_TYPE }}
        KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ env.KEY_ALIAS }}
        KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mytv-android-tv-${{ github.event.inputs.version || github.ref_name }}-release.apk
        path: tv/build/outputs/apk/original/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      # 移除条件判断，始终执行
      with:
        name: Release ${{ format('v{0}', github.event.inputs.version) || github.ref_name }}
        body: "Android TV 版本 ${{ github.event.inputs.version || github.ref_name }}"
        files: tv/build/outputs/apk/original/release/*.apk
