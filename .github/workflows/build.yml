name: Kotlin CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "输入版本号（格式：x.x.x，例如 1.2.3）"
        required: true
  push:
    tags:
      - "v*"  # 支持 Tag 触发

jobs:
  build:
    runs-on: ubuntu-latest
    environment: keystore
    env:
      KEYSTORE_PATH: tv/app/keystore.p12
      KEYSTORE_TYPE: PKCS12
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整 Git 历史记录

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: 解码生成 p12
      run: |
        mkdir -p tv/app
        echo "正在解码BASE64密钥..."
        openssl base64 -d -A <<< "${{ secrets.KEYSTORE_BASE64 }}" > $KEYSTORE_PATH
        echo "=== 文件验证 ==="
        echo "当前工作目录: $(pwd)"
        echo "密钥库绝对路径: $(realpath $KEYSTORE_PATH)"
        ls -lR tv/app
        if [ ! -s $KEYSTORE_PATH ]; then
          echo "❌ 错误：keystore.p12 文件为空"
          exit 1
        fi
        echo "验证密钥库..."
        keytool -list -v \
          -keystore $KEYSTORE_PATH \
          -storepass $KEYSTORE_PASSWORD \
          -storetype $KEYSTORE_TYPE || {
            echo "❌ 密钥库验证失败";
            exit 1;
          }

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :tv:assembleRelease --stacktrace
      env:
        KEYSTORE: ${{ github.workspace }}/tv/app/keystore.p12
        KEYSTORE_TYPE: ${{ env.KEYSTORE_TYPE }}
        KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ env.KEY_ALIAS }}
        KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

   - name: 上传 APK 到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mytv-android-tv-${{ github.event.inputs.version || github.ref_name }}-release.apk
        path: tv/build/outputs/apk/original/release/*.apk

    - name: 动态创建 Tag（手动触发时）
      if: ${{ github.event_name == 'workflow_dispatch' }}  # 仅在手动触发时运行
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        TAG_NAME="v${{ github.event.inputs.version }}"
        git tag -a $TAG_NAME -m "Release $TAG_NAME"
        git push origin $TAG_NAME

    - name: 上传到 GitHub Release
      uses: ncipollo/release-action@v1
      with:
        name: Release v${{ github.event.inputs.version || github.ref_name }}
        tag: v${{ github.event.inputs.version || github.ref_name }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: tv/build/outputs/apk/original/release/*.apk  # 直接指定 APK 路径
        allowUpdates: true  # 允许更新现有 Release
        generateReleaseNotes: true  # 自动生成 Release 说明
