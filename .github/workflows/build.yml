name: Kotlin CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "输入版本号（格式：x.x.x，例如 1.2.3）"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: keystore
    env:
      KEYSTORE_PATH: tv/app/keystore.p12  # 修正路径匹配项目结构
      KEYSTORE_TYPE: PKCS12
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: 解码生成 p12
      run: |
        mkdir -p tv/app  # 创建符合项目结构的目录
        echo "正在解码BASE64密钥..."
        
        # 解码到正确路径
        openssl base64 -d -A <<< "${{ secrets.KEYSTORE_BASE64 }}" > $KEYSTORE_PATH
        
        echo "=== 文件验证 ==="
        echo "当前工作目录: $(pwd)"
        echo "密钥库绝对路径: $(realpath $KEYSTORE_PATH)"
        ls -lR tv/app  # 递归列出目录结构
        
        if [ ! -s $KEYSTORE_PATH ]; then
          echo "❌ 错误：keystore.p12 文件为空"
          exit 1
        fi

        # 密钥库有效性验证
        echo "验证密钥库..."
        keytool -list -v \
          -keystore $KEYSTORE_PATH \
          -storepass $KEYSTORE_PASSWORD \
          -storetype $KEYSTORE_TYPE || {
            echo "❌ 密钥库验证失败";
            exit 1;
          }

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :tv:assembleRelease --stacktrace
      env:
        KEYSTORE: ${{ env.KEYSTORE_PATH }}  # 传递绝对路径
        KEYSTORE_TYPE: ${{ env.KEYSTORE_TYPE }}
        KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ env.KEY_ALIAS }}
        KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mytv-android-tv-${{ inputs.version }}-release.apk
        path: tv/build/outputs/apk/release/*.apk
